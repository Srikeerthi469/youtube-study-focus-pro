<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; font-family: 'Segoe UI', Arial, sans-serif; padding: 12px; margin: 0; background: #181818; color: #f1f1f1; }
    h3 { margin: 0 0 10px 0; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 6px; text-align: center; color: #ff0000; }
    .section { border-bottom: 1px solid #282828; padding: 8px 0; }
    .option { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; font-size: 12px; }
    input[type="checkbox"] { cursor: pointer; }
    .timer-display { font-size: 24px; font-weight: bold; text-align: center; margin: 8px 0; color: #00ffcc; font-family: monospace; }
    .btn-container { display: flex; gap: 5px; justify-content: center; margin-top: 8px; }
    button { background: #cc0000; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; width: 100%; }
    button:hover { background: #990000; }
    #resetBtn { background: #444; }
    #resetBtn:hover { background: #555; }
    .input-container { display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin-bottom: 5px; }
    .time-input { width: 45px; background: #222; border: 1px solid #444; color: white; border-radius: 3px; padding: 2px 4px; text-align: center; }
  </style>
</head>
<body>
  <h3>Study Focus Pro</h3>
  
  <!-- Toggles Section -->
  <div class="section">
    <div class="option">
      <label for="hideFeed">Hide Home Feed</label>
      <input type="checkbox" id="hideFeed" checked>
    </div>
    <div class="option">
      <label for="hideShorts">Hide Shorts Tab</label>
      <input type="checkbox" id="hideShorts" checked>
    </div>
  </div>

  <!-- Customized Pomodoro Timer Section -->
  <div class="section" style="border: none;">
    <div class="input-container">
      <label for="minutesInput">Set Study Minutes:</label>
      <input type="number" id="minutesInput" class="time-input" value="25" min="1" max="180">
    </div>
    <div class="timer-display" id="timerDisplay">25:00</div>
    <div class="btn-container">
      <button id="startBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
